data:
  raw_path: "data/raw/EUPDCorp.rds"        # download from https://zenodo.org/records/15056399
  output_path: "data/processed/ep_ai_speeches.csv"
  results_path: "data/processed/ep_ai_classified.csv"
  analysis_path: "data/processed/ep_ai_analysis.csv"

corpus:
  min_speech_length: 100 # minimum character length of speeches to include; short speeches are often procedural and less likely to contain substantive framing
  years: [2019, 2020, 2021, 2022, 2023, 2024]
  term: 9                                   # 9th EP term only

model:
  #name: "MoritzLaurer/ModernBERT-large-zeroshot-v2.0"
  name: "MoritzLaurer/deberta-v3-base-zeroshot-v2.0"
  device: "mps"                             # Apple Silicon; change to "cpu" if needed
  batch_size: 64      # smaller batch size for classification to avoid OOM errors; relevance filter can use larger batch size since it's single-label
  multi_label: false  # one dominant framing per speech — scores sum to 1
  max_tokens: 256     # truncate speeches; framing signal is early. One token is roughly 4 chars, so 256 tokens = ~1000 chars. Longer = more GPU memory and slower inference.
  fp16: true          # half precision — faster on MPS/CUDA

relevance_filter:
  hypothesis: "This speech discusses artificial intelligence, machine learning, automated systems, or digital technology policy."
  threshold: 0.70     # entailment score above this = AI-relevant
  batch_size: 128     # can be larger than classify batch — single hypothesis
  max_tokens: 256     # truncate speeches for relevance filter as well; the framing signal is often early, and this speeds up inference and reduces memory usage

framings:
  risk_based:
    label: "risk_based"
    hypothesis: "This speech focuses on risks, safety concerns, liability, or the need to regulate harmful AI systems."
  rights_based:
    label: "rights_based"
    hypothesis: "This speech focuses on fundamental rights, privacy, non-discrimination, or human dignity in relation to AI."
  innovation_focused:
    label: "innovation_focused"
    hypothesis: "This speech focuses on innovation, economic competitiveness, investment, or reducing regulatory burden on AI."
  sovereignty_focused:
    label: "sovereignty_focused"
    hypothesis: "This speech focuses on European strategic autonomy, technological sovereignty, or reducing dependency on non-European AI."

analysis:
  # EP group to party family mapping — keys are actual epg_short values in EUPDCorp
  party_family:
    EPP: "Christian Democrat / Conservative"
    SOCPESPASD: "Social Democrat"
    ALDERE: "Liberal"
    GEFA: "Green / Regionalist"
    ECR: "Conservative / Eurosceptic"
    NAT: "Radical Right"
    GUENGL: "Radical Left"
    IND: "Non-attached"

  # East-West and North-South are two INDEPENDENT cleavage dimensions — a country
  # can appear in both (e.g. Estonia = East + North; Romania = East + South).
  # Within each dimension the lists are mutually exclusive (no country in both
  # east and west, or both north and south). Countries not in either list of a
  # dimension are coded "Other" and excluded from regressions.

  # East-West: 2004+ accession countries = East; pre-2004 members = West
  east_countries: [Poland, "Czech Republic", Slovakia, Hungary, Slovenia, Estonia, Latvia, Lithuania, Romania, Bulgaria, Croatia]
  west_countries: [Germany, France, Italy, Spain, Portugal, Netherlands, Belgium, Luxembourg, Austria, Sweden, Denmark, Finland, Ireland, Greece, Cyprus, Malta]

  # EU accession wave (binary: pre-2004 vs post-2004)
  # pre-2004: EU-15 founding/early members (joined before 2004 enlargement)
  # post-2004: 2004 wave (CY, CZ, EE, HU, LT, LV, MT, PL, SI, SK),
  #            2007 wave (BG, RO), 2013 wave (HR)
  pre2004_countries:  [Germany, France, Italy, Spain, Portugal, Netherlands, Belgium,
                       Luxembourg, Austria, Sweden, Denmark, Finland, Ireland, Greece]
  post2004_countries: [Poland, "Czech Republic", Slovakia, Hungary, Slovenia,
                       Estonia, Latvia, Lithuania, Romania, Bulgaria, Croatia,
                       Cyprus, Malta]

  # North-Middle-South tri-partition (replaces binary North-South)
  # North:   Nordic + Baltic + Ireland
  # Middle:  Germanic + Benelux + Franco core + Visegrád + Baltics already in North
  # South:   Mediterranean (including Cyprus and Malta as island Western states)
  north_countries:  [Sweden, Denmark, Finland, Estonia, Latvia, Lithuania, Ireland]
  middle_countries: [Germany, France, Netherlands, Belgium, Luxembourg, Austria,
                     Poland, "Czech Republic", Slovakia, Hungary, Romania]
  south_countries:  [Italy, Spain, Portugal, Greece, Croatia, Slovenia,
                     Bulgaria, Cyprus, Malta]
